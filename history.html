<!DOCTYPE html>

<html i18n-values="dir:textdirection;">
<head>
    <title>eHistory</title>
    <link rel="stylesheet" href="css/normalize.css" type="text/css"/>
    <link rel="stylesheet" href="css/history.css" type="text/css"/>
    <link rel="stylesheet" href="fonts/css/fontawesome.css" type="text/css"/>
    <link rel="stylesheet" href="fonts/css/solid.css" type="text/css"/>
</head>
<body>
<header>
    <form action="#" id="frm-search"/>
    <div class="search-container">
        <div class="query-wrapper">
            <input autocomplete=off type="text" class="query" id="query" size="110"/>
            <div class="open-advanced">
                <i class="fas fa-angle-down" style="font-size: 16px; color:#444444;"></i>
            </div>
        </div>
        <button value="search" class="bttn search" type="submit">Search</button>
    </div>
    <div class="advanced-search">
        <fieldset><label>Text</label><input type=text id="pure-text"></fieldset>
        <fieldset><label>Title</label><input type=text data-settings-item="title"></fieldset>
        <fieldset><label>Site</label><input type=text data-settings-item="site"></fieldset>
        <fieldset><label>URL</label><input type=text data-settings-item="url"></fieldset>
        <fieldset><label>From</label><input type=date data-settings-item="startTime"></fieldset>
        <fieldset><label>To</label><input type=date data-settings-item="endTime"></fieldset>
    </div>
    </form>
    <nav class="top-bar">
        <button class="bttn delete dropdown">
            <span class="trash">
                <i class="fas fa-trash" style="font-size: 16px; color:#444444;"></i>
            </span>
            <span class="dwn-arrow">
                <i class="fas fa-angle-down" style="font-size: 16px; color:#444444;"></i>
            </span>
        </button>
        <menu class="delete-menu">
            <button class="selected">Delete Selected</button>
            <button class="clear" id="btn-clear-history">Clear History</button>
            <button class="results">Delete Search Results</button>
        </menu>
        <div class="page-buttons">
            <button class="prev-page bttn">
                <i class="fas fa-angle-left" style="font-size: 32px; color:#444444;"></i>
            </button>
            <span class="page-no">1</span>
            <button class="next-page bttn">
                <i class="fas fa-angle-right" style="font-size: 32px; color:#444444;"></i>
            </button>
        </div>
    </nav>
    <nav class="top-bar-settings">
        <a href="settings.html"><i class="fas fa-tools" style="font-size: 24px; color:#444444;"></i></a>
    </nav>
</header>
<section class="content">
    <div id="div-main">
        <table id="tbl-main">
            <tbody></tbody>
        </table>
        <div id="throbber" class=""></div>
    </div>
</section>

<menu class="options-menu">
    <button class="more">More from this site</button>
    <button class="delete">Delete visit</button>
</menu>

<script type="x-template" id="tmpl-entry-row">
    <tr class="entry" data-id="{{id}}" data-day="{{day}}">
        <td><input type="checkbox" class="chk-entry" {{#isSelected}} checked="checked" {{/isSelected}} /></td>
        <td class="time">{{{date}}}</td>
        <td class="item-content">
            <a href="{{url}}" style="background-image:url('chrome://favicon/{{url}}')">{{#title}}{{title}}{{/title}}{{^title}}{{url}}{{/title}}</a>
            <span class="domain">{{domain}}</span>
            <span class="options">
                <span class="dwn-arrow">
                <i class="fas fa-angle-down" style="font-size: 16px; color:#444444;"></i>
                </button>
            </span>
        </td>
    </tr>
</script>

<script type="x-template" id="tmpl-day-row">
    <tr class="hdr-day">
        <td><input type="checkbox" class="chk-day"/></td>
        <td class="date" colspan="2">{{date}}</td>
    </tr>
</script>

<script type="text/javascript" src="vendor/jquery.js"></script>
<script type="text/javascript" src="vendor/mustache.js"></script>
<script type="text/javascript" src="vendor/spin.js"></script>
<script type="text/javascript" src="lib/util.js"></script>
<script type="text/javascript" src="lib/visitsbyday.js"></script>
<script type="text/javascript" src="lib/ehistory.js"></script>
<script type="text/javascript" src="lib/model.js"></script>
<script type="text/javascript" src="lib/view.js"></script>
<script type="text/javascript" src="lib/query_parser.js"></script>
<script type="text/javascript" src="lib/controller.js"></script>
</body>
</html>
